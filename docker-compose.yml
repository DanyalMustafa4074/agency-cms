version: '3.8'

services:

  db:
    image: postgres:15
    container_name: agency_db
    environment:
      POSTGRES_DB: agencydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agency_network

  backend:
    build: ./backend
    container_name: agency_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: agencydb
      DB_USER: admin
      DB_PASS: admin123
    depends_on:
      - db
    networks:
      - agency_network

  frontend:
    build: ./frontend
    container_name: agency_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agency_network

volumes:
  db_data:

networks:
  agency_network:
    driver: bridge